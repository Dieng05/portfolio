<div class="w-full flex flex-column align-items-center justify-content-center mt-6 mb-6">
  <h1 class="text-4xl font-bold text-900 flex align-items-center justify-content-center gap-3 m-0 mb-2">
    Formation Académique
  </h1>
  <p class="text-xl text-600 text-center m-0"> Parcours universitaire et diplômes obtenus </p>
</div>

<div class="w-full px-4 py-6 surface-100">
  <div class="flex flex-wrap justify-content-center gap-4">

    <div class="flex-1 xl:w-4 md:w-10 sm:w-12 w-12 bg-white border-round-xl p-4
         shadow-4 border-2 border-transparent transition-all transition-duration-300
         hover:shadow-6 hover:border-primary" *ngFor="let formation of formations">

      <div class="flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
        <div class="flex align-items-center gap-3 flex-1">
          <div class="border-circle flex align-items-center justify-content-center"
            [style.background]="formation.color + '20'"
            [style.color]="formation.color"
            [style.width.px]="50"
            [style.height.px]="50"
            [style.minWidth.px]="50">
            <i [class]="formation.icon" class="text-2xl"></i>
          </div>

          <div class="flex-1">
            <h2 class="text-2xl font-bold text-900 m-0">{{ formation.diplome }}</h2>
            <p class="text-sm text-500 m-0 mt-1">
              <i class="pi pi-calendar mr-2"></i>{{ formation.annee }}
            </p>
          </div>
        </div>

        <i class="text-2xl"
          [class.fa-spin]="formation.statut === 'En cours'"
          [class.fa-spinner]="formation.statut === 'En cours'"
          [class.fas]="true"
          [class.text-primary]="formation.statut === 'En cours'"
          [class.fa-check-circle]="formation.statut === 'Obtenu'"
          [class.text-green-500]="formation.statut === 'Obtenu'"></i>
      </div>

      <div class="pl-4 border-left-3" [style.border-color]="formation.color">
        <div class="flex flex-column gap-2">

          <div class="flex align-items-center gap-2 text-700">
            <i class="pi pi-building text-lg" [style.color]="formation.color"></i>
            <span class="font-semibold">{{ formation.etablissement }}</span>
          </div>

          <div class="flex align-items-center gap-2 text-600">
            <i class="pi pi-map-marker text-lg" [style.color]="formation.color"></i>
            <span>{{ formation.localisation }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="w-full max-w-4xl mx-auto mt-6 mb-6 px-3">
  <div class="grid">

    <div class="col-12 md:col-4">
      <div class="text-center p-4 border-round-xl bg-blue-50 transition-all transition-duration-300 hover:shadow-3 cursor-pointer">
        <i class="pi pi-graduation-cap text-5xl text-blue-500 mb-2"></i>
        <h3 class="text-3xl font-bold text-blue-600 m-0">3</h3>
        <p class="text-600 m-0 mt-2">Diplômes</p>
      </div>
    </div>

    <div class="col-12 md:col-4">
      <div class="text-center p-4 border-round-xl bg-green-50 transition-all transition-duration-300 hover:shadow-3 cursor-pointer">
        <i class="pi pi-calendar text-5xl text-green-500 mb-2"></i>
        <h3 class="text-3xl font-bold text-green-600 m-0">5+</h3>
        <p class="text-600 m-0 mt-2">Années d'études</p>
      </div>
    </div>

    <div class="col-12 md:col-4">
      <div class="text-center p-4 border-round-xl bg-purple-50 transition-all transition-duration-300 hover:shadow-3 cursor-pointer">
        <i class="pi pi-star text-5xl text-purple-500 mb-2"></i>
        <h3 class="text-3xl font-bold text-purple-600 m-0">MIAGE</h3>
        <p class="text-600 m-0 mt-2">Spécialisation</p>
      </div>
    </div>

  </div>
</div>
