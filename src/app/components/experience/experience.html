<div class="w-full flex flex-column align-items-center justify-content-center">

  <div class="w-full flex flex-column align-items-center justify-content-center mt-6 mb-4">
    <h1 class="w-full text-4xl font-bold text-gray-900 flex align-items-center justify-content-center gap-3 m-0 mb-4">
      Expériences Professionnelles
    </h1>
  </div>

  <div class="w-full flex flex-column gap-6">
    <div *ngFor="let exp of experiences; let i = index"
         class="w-full flex gap-4 bg-white border-1 border-gray-200 border-round-lg p-6 hover:shadow-3 transition-all-300">

      <div class="flex-1 flex flex-column gap-3">

        <div class="flex flex-column">
          <h2 class="text-2xl font-bold text-gray-900 m-0 mb-2">{{ exp.title }}</h2>

          <div class="flex flex-wrap gap-2 mb-2">
            <span class="flex align-items-center gap-2 text-sm text-gray-700 bg-gray-100 px-3 py-2 border-round-full">
              <i class="pi pi-building text-blue-500"></i>
              {{ exp.company }}
            </span>
            <span class="flex align-items-center gap-2 text-sm text-gray-700 bg-gray-100 px-3 py-2 border-round-full">
              <i class="pi pi-map-marker text-red-500"></i>
              {{ exp.location }}
            </span>
            <span class="flex align-items-center gap-2 text-sm text-gray-700 bg-gray-100 px-3 py-2 border-round-full">
              <i class="pi pi-calendar text-green-500"></i>
              {{ exp.period }}
            </span>
          </div>
        </div>

        <div class="flex flex-column gap-2 ml-2">
          <div *ngFor="let desc of exp.description"
               class="flex gap-3 align-items-start">
            <i class="pi pi-check-circle text-green-500 mt-1"></i>
            <p class="m-0 text-gray-700 text-base line-height-2">{{ desc }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
